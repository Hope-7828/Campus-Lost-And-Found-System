<!DOCTYPE html>
<html>
<head>
  <title>View Items</title>
</head>
<body>
  <h2>All Reported Items</h2>
  <table border="1">
    <tr>
      <th>ID</th>
      <th>Item Name</th>
      <th>Description</th>
      <th>Status</th>
      <th>Contact Info</th>
      <th>Date Reported</th>
    </tr>
    {% for item in items %}
    <tr>
      <td>{{ item[0] }}</td>
      <td>{{ item[1] }}</td>
      <td>{{ item[2] }}</td>
      <td>{{ item[3] }}</td>
      <td>{{ item[4] }}</td>
      <td>{{ item[5] }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
